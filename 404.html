<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found | Atlas Workspace</title>
    <style>
      :root {
        --bg: #f6f7f4;
        --surface: #ffffff;
        --ink: #17201c;
        --muted: #66746d;
        --line: #d9e1dc;
        --accent: #126b5a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(440px, 100%);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 18px 48px rgba(23, 32, 28, 0.08);
      }

      .mark {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        margin-bottom: 18px;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-weight: 800;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 40px;
        padding: 0 14px;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">A</div>
      <h1>Page not found</h1>
      <p>This Atlas Workspace page does not exist or may have moved.</p>
      <a href="/">Back to workspace</a>
    </main>
  </body>
</html>
